name = "Helm"
grammar = "gotmpl"
path_suffixes = ["tpl"]
first_line_pattern = "\\A(?:\\u{feff})?\\{\\{-?\\s"
line_comments = ["# "]
autoclose_before = ",]}"
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
    { start = "'", end = "'", close = true, newline = false, not_in = ["string"] },
]
tab_size = 2
word_characters = ["-", "."]
