name = "Kubernetes"
code_fence_block_name = "kubernetes"
grammar = "yaml"
path_suffixes = ["k8s.yaml", "k8s.yml", "kubernetes.yaml", "kubernetes.yml"]
first_line_pattern = "(?m)\\A(?:\\u{feff})?(?:(?:[^\\n]*\\n){0,24}^apiVersion\\s*:\\s*\\S[^\\n]*\\n(?:[^\\n]*\\n){0,24}^kind\\s*:\\s*\\S|(?:[^\\n]*\\n){0,24}^kind\\s*:\\s*\\S[^\\n]*\\n(?:[^\\n]*\\n){0,24}^apiVersion\\s*:\\s*\\S)"
line_comments = ["# "]
autoclose_before = ",]}"
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
    { start = "'", end = "'", close = true, newline = false, not_in = ["string"] },
]
auto_indent_on_paste = false
auto_indent_using_last_non_empty_line = false
increase_indent_pattern = "(:?^[^#]*:\\s*[|>]?\\s*$)|(:?^\\s*-[^#]*:\\s*(:?#+.*)$)"
prettier_parser_name = "yaml"
tab_size = 2
word_characters = ["-", "."]
