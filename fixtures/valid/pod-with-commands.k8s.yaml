apiVersion: v1
kind: Pod
metadata:
  name: command-demo
  namespace: default
spec:
  containers:
    - name: main
      image: busybox:latest
      command:
        - /bin/sh
        - -c
      args:
        - echo "hello world"
        - sleep 3600
    - name: init-script
      image: alpine:latest
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "running init"
          if [ -f /config/ready ]; then
            echo "config found"
          fi
      env:
        - name: APP_ENV
          value: production
      volumeMounts:
        - name: config
          mountPath: /config
  volumes:
    - name: config
      configMap:
        name: app-config
