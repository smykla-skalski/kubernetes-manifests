id = "kubernetes"
name = "Kubernetes"
description = "Kubernetes support for Zed."
version = "0.10.0"
schema_version = 1
authors = ["Bart Smykla <bartek@smykla.com>"]
repository = "https://github.com/smykla-skalski/kubernetes-manifests"
snippets = "./snippets/kubernetes.json"

[language_servers.kubernetes-language-server]
name = "Kubernetes Language Server"
languages = ["Kubernetes"]

[language_servers.kubernetes-language-server.language_ids]
"Kubernetes" = "yaml"

[language_servers.helm-language-server]
name = "Helm Language Server"
languages = ["Helm"]

[grammars.yaml]
repository = "https://github.com/zed-industries/tree-sitter-yaml"
commit = "baff0b51c64ef6a1fb1f8390f3ad6015b83ec13a"

[grammars.gotmpl]
repository = "https://github.com/ngalaiko/tree-sitter-go-template"
commit = "04270cd3512e2c7de0c5f2823725d7b0c4c01fda"

[context_servers.kubernetes-context-server]

[slash_commands.kubernetes]
description = "Insert a Kubernetes resource manifest template"
requires_argument = true

[slash_commands.kubernetes-explain]
description = "Explain a Kubernetes resource type"
requires_argument = true

# The context server binary path and language server binary paths are
# user-configurable through settings, so the wildcard is required.
[[capabilities]]
kind = "process:exec"
command = "*"
args = ["**"]

[[capabilities]]
kind = "npm:install"
package = "yaml-language-server"

# Helm language server and Kubernetes context server binaries are
# downloaded from GitHub releases (mrjosh/helm-ls, strowk/mcp-k8s-go).
[[capabilities]]
kind = "download_file"
host = "github.com"
path = ["**"]
