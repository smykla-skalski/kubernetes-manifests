[package]
name = "kubernetes"
version = "0.1.0"
edition = "2021"
license = "MIT"
publish = false

[lib]
path = "src/kubernetes.rs"
crate-type = ["cdylib"]

[dependencies]
serde_json = "1.0"
zed_extension_api = "0.7.0"

[dev-dependencies]
regex = "1.11"
toml = "0.8"

[lints.clippy]
pedantic = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
absolute_paths = "deny"
